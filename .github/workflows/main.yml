name: RDP

on:
  workflow_dispatch:

jobs:
  rdp:
    runs-on: windows-latest
    timeout-minutes: 360

    steps:
      - name: Enable RDP + Set Password
        run: |
          net user runneradmin P@ssw0rd123
          net localgroup administrators runneradmin /add
          reg add "HKLM\SYSTEM\CurrentControlSet\Control\Terminal Server" /v fDenyTSConnections /t REG_DWORD /d 0 /f
          reg add "HKLM\SYSTEM\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp" /v UserAuthentication /t REG_DWORD /d 1 /f
          Enable-NetFirewallRule -DisplayGroup "Remote Desktop"

      - name: Install Chocolatey
        run: |
          Set-ExecutionPolicy Bypass -Scope Process -Force
          [System.Net.ServicePointManager]::SecurityProtocol = 3072
          iex ((New-Object System.Net.WebClient).DownloadString('https://community.chocolatey.org/install.ps1'))

      - name: Install Tailscale
        run: choco install tailscale -y

      - name: Start Tailscale
        run: |
          $env:TSKEY="${{ secrets.TAILSCALE_AUTH_KEY }}"
          tailscale up --authkey $env:TSKEY

      - name: Show IP + Login Info
        run: |
          Write-Host "========================="
          Write-Host "IP:"
          tailscale ip -4
          Write-Host "Username: runneradmin"
          Write-Host "Password: P@ssw0rd123"
          Write-Host "========================="

      - name: Keep Alive
        run: Start-Sleep -Seconds 21600
